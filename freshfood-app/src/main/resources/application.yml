server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: freshfood-shop
  profiles:
    active: dev
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/freshfood_shop?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-cookie: false
  is-read-header: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  default-flat-param-object: true

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.yan.freshfood: debug
    com.baomidou.mybatisplus: info

# ============== 数据库字段加密 ==============
# 用于手机号、邮箱、收货地址等敏感字段的对称加密
# Key 必须为 32 字节（Base64 编码后的字符串），生产环境通过环境变量注入
freshfood:
  crypto:
    aes-key: ${AES_KEY:ZGV2LWtleS0xMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}